<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dermatological Diagnostic Support System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="mainContainer">
        <h1>Dermatological Diagnostic Support System</h1>

        <div class="content-wrapper">
            <div class="left-panel">
                <div class="row-inputs">
                    <div class="input-group">
                        <label>Age</label>
                        <input type="number" id="age" value="30">
                    </div>
                    <div class="input-group">
                        <label>Gender</label>
                        <select id="gender">
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Body Part</label>
                        <select id="localization">
                            <option value="back">Back</option>
                            <option value="face">Face</option>
                            <option value="chest">Chest</option>
                            <option value="upper extremity">Arm</option>
                            <option value="lower extremity">Leg</option>
                        </select>
                    </div>
                </div>

                <div class="upload-section" onclick="document.getElementById('fileInput').click()">
                    <p id="uploadText" style="color:#666; font-size:13px; margin:0;"><strong>Click to Upload Image</strong></p>
                    <input type="file" id="fileInput" hidden onchange="previewImage(event)">
                    <img id="preview" src="#" style="display: none;">
                </div>

                <button class="btn" onclick="predict()">Analyze Lesion</button>
            </div>

            <div class="right-panel" id="resultsPanel">
                <div class="results-content">
                    <h2>Predicted Result: <span id="diagnosis" style="color:#2980b9">--</span></h2>
                    <h3>Confidence: <span id="confidence">--</span></h3>
                    
                    <div class="heatmap-container">
                        <p style="margin: 0 0 5px 0; font-size: 14px; color: #555;"><strong>Explainable AI (Grad-CAM):</strong></p>
                        <img id="heatmapOutput" src="" alt="Grad-CAM Heatmap">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
